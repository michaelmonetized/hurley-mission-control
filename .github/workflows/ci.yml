name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: npm run typecheck --workspace=web
      - name: Convex schema check
        run: bun x convex deploy --dry-run --stdin < /dev/null || true
